<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Quest 3S - Raycaster Fix</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-sky color="#87CEEB"></a-sky>
      <a-plane position="0 0.01 0" rotation="-90 0 0" width="20" height="20" color="#2E8B57"></a-plane>

      <a-entity id="rig">
        <a-entity camera position="0 1.6 0" look-controls></a-entity>
        
        <a-entity hand-tracking-controls="hand: left"
                  raycaster="objects: .grabbable; far: 2"
                  line="color: red; opacity: 0.5"></a-entity>
        
        <a-entity hand-tracking-controls="hand: right"
                  raycaster="objects: .grabbable; far: 2"
                  line="color: red; opacity: 0.5"></a-entity>
      </a-entity>

      <a-box class="grabbable" position="0 1.2 -0.5" color="red" scale="0.15 0.15 0.15"
             animation__hover="property: scale; to: 0.2 0.2 0.2; startEvents: raycaster-intersection; pauseEvents: raycaster-intersection-cleared; dur: 200"
             animation__out="property: scale; to: 0.15 0.15 0.15; startEvents: raycaster-intersection-cleared; dur: 200">
      </a-box>
      
      <a-box class="grabbable" position="0.5 1.2 -0.5" color="blue" scale="0.15 0.15 0.15"
             animation__hover="property: scale; to: 0.2 0.2 0.2; startEvents: raycaster-intersection; pauseEvents: raycaster-intersection-cleared; dur: 200"
             animation__out="property: scale; to: 0.15 0.15 0.15; startEvents: raycaster-intersection-cleared; dur: 200">
      </a-box>

    </a-scene>
  </body>
</html>
