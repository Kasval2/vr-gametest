<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Quest 3S - Direct Finger Touch</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script>
      AFRAME.registerComponent('xr-finger-test', {
        tick: function () {
          const scene = this.el.sceneEl;
          const frame = scene.frame;
          const session = scene.xrSession;
          
          if (session && frame) {
            // Ищем все устройства ввода (руки)
            for (const inputSource of session.inputSources) {
              if (inputSource.hand) {
                // Берем кончик указательного пальца (index-finger-tip)
                const joint = inputSource.hand.get('index-finger-tip');
                if (joint) {
                  const pose = frame.getJointPose(joint, scene.renderer.xr.getReferenceSpace());
                  if (pose) {
                    const fingerPos = pose.transform.position;
                    const cubePos = this.el.object3D.position;
                    
                    // Считаем расстояние вручную
                    const dx = fingerPos.x - cubePos.x;
                    const dy = fingerPos.y - cubePos.y;
                    const dz = fingerPos.z - cubePos.z;
                    const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);

                    if (dist < 0.1) {
                      this.el.setAttribute('color', 'pink');
                      this.el.setAttribute('scale', '0.5 0.5 0.5');
                      return; // Нашли касание, выходим
                    }
                  }
                }
              }
            }
          }
          // Если касания нет - возвращаем исходный вид
          this.el.setAttribute('color', 'cyan');
          this.el.setAttribute('scale', '0.3 0.3 0.3');
        }
      });
    </script>
  </head>
  <body>
    <a-scene>
      <a-sky color="#000"></a-sky>
      <a-box xr-finger-test position="0 1.4 -0.5" color="cyan" width="0.3" height="0.3" depth="0.3"></a-box>
      
      <a-entity hand-tracking-controls="hand: left"></a-entity>
      <a-entity hand-tracking-controls="hand: right"></a-entity>
    </a-scene>
  </body>
</html>
