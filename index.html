<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Quest 3S - Hand Physics Fixed</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script>
      AFRAME.registerComponent('pro-grab', {
        init: function () {
          this.grabbed = false;
        },
        tick: function () {
          const scene = this.el.sceneEl;
          const frame = scene.frame;
          const session = scene.xrSession;

          if (!session || !frame) return;

          let isAnyHandPinching = false;

          for (const inputSource of session.inputSources) {
            if (inputSource.hand) {
              const tip = inputSource.hand.get('index-finger-tip');
              const thumb = inputSource.hand.get('thumb-tip');
              
              if (tip && thumb) {
                const tipPose = frame.getJointPose(tip, scene.renderer.xr.getReferenceSpace());
                const thumbPose = frame.getJointPose(thumb, scene.renderer.xr.getReferenceSpace());

                if (tipPose && thumbPose) {
                  const tPos = tipPose.transform.position;
                  const thPos = thumbPose.transform.position;
                  const cubePos = this.el.object3D.position;

                  const distToCube = Math.sqrt(Math.pow(tPos.x - cubePos.x, 2) + Math.pow(tPos.y - cubePos.y, 2) + Math.pow(tPos.z - cubePos.z, 2));
                  const pinchDist = Math.sqrt(Math.pow(tPos.x - thPos.x, 2) + Math.pow(tPos.y - thPos.y, 2) + Math.pow(tPos.z - thPos.z, 2));

                  // Если эта рука хватает
                  if (distToCube < 0.15 && pinchDist < 0.025) {
                    isAnyHandPinching = true;
                    this.grabbed = true;
                    // Центрируем куб между пальцами
                    cubePos.set((tPos.x + thPos.x)/2, (tPos.y + thPos.y)/2, (tPos.z + thPos.z)/2);
                  }
                }
              }
            }
          }

          // Меняем цвет в зависимости от общего состояния
          if (isAnyHandPinching) {
            this.el.setAttribute('color', '#FFD700'); // Золотой
          } else {
            this.el.setAttribute('color', '#4CC3D9'); // Голубой
            this.grabbed = false;
          }
        }
      });
    </script>
  </head>
  <body>
    <a-scene background="color: #111">
      <a-entity id="rig">
        <a-entity camera position="0 1.6 0"></a-entity>
        <a-entity hand-tracking-controls="hand: left; modelStyle: mesh; modelColor: #ffffff"></a-entity>
        <a-entity hand-tracking-controls="hand: right; modelStyle: mesh; modelColor: #ffffff"></a-entity>
      </a-entity>

      <a-box pro-grab position="0 1.3 -0.5" color="#4CC3D9" width="0.2" height="0.2" depth="0.2"></a-box>
      
      <a-grid position="0 0 0" cellColor="#444" sectionColor="#888"></a-grid>
    </a-scene>
  </body>
</html>
